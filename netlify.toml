[build]
  command = "echo 'Forzando Build para inyectar entorno de Blobs...'"
  publish = "."

[functions]
  directory = "netlify/functions"

# Redirect API calls to serverless functions
[[redirects]]
  from = "/api/get-products"
  to = "/.netlify/functions/get-products"
  status = 200
  force = true

[[redirects]]
  from = "/api/save-products"
  to = "/.netlify/functions/save-products"
  status = 200
  force = true

[[redirects]]
  from = "/api/submit-review"
  to = "/.netlify/functions/submit-review"
  status = 200
  force = true

# Redirect /admin to login unless admin role
[[redirects]]
  from = "/admin.html"
  to = "/login.html"
  status = 302
  force = false
  conditions = {Role = ["!admin"]}

[[redirects]]
  from = "/admin.html"
  to = "/admin.html"
  status = 200
  force = false
  conditions = {Role = ["admin"]}

# ── Security Headers (all pages) ───────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# ── Cache: Images (30 days) ────────────────────────────────
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# ── Cache: CSS / JS (7 days, revalidate) ──────────────────
[[headers]]
  for = "/assets/css/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  for = "/assets/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# ── No-cache: HTML (always fresh) ─────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── Sitemap & robots headers ────────────────────────────────
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
