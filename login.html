<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — GROPESTAMPADOS.UY Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    (function(){
      try {
        const v = JSON.parse(localStorage.getItem('grop_visual') || 'null');
        if(v && typeof v === 'object') {
          const root = document.documentElement.style;
          const isValidHex = c => typeof c === 'string' && /^#[0-9A-Fa-f]{6}$/.test(c);
          const isBugged = v.mint === '#000000' && v.purp === '#000000';
          const valid = (hx, def) => isBugged ? def : (isValidHex(hx) ? hx : def);
          root.setProperty('--c-mint', valid(v.mint, '#BFFF00')); root.setProperty('--c-mint-l', valid(v.mint, '#BFFF00')+'cc');
          root.setProperty('--c-purp', valid(v.purp, '#8A2BE2'));
          root.setProperty('--c-magenta', valid(v.magenta, '#FF00FF'));
          root.setProperty('--c-bg', valid(v.bg, '#080810'));
        }
      } catch(e){}
    })();
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            mint: { DEFAULT: 'var(--c-mint, #BFFF00)', light: 'var(--c-mint-l, #d4ff66)' },
            purple: { DEFAULT: 'var(--c-purp, #8A2BE2)', light: 'var(--c-magenta, #FF00FF)' },
            magenta: { DEFAULT: 'var(--c-magenta, #FF00FF)', light: 'var(--c-magenta, #ff66ff)' },
            bgMain: 'var(--c-bg, #080810)'
          }
        }
      }
    }
  </script>
  <style>
    body, .bg-\[\#0a0a0a\], .bg-bgMain { background-color: var(--c-bg, #0a0a0a) !important; }
  </style>
  <link rel="stylesheet" href="/assets/css/styles.css">

  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md px-6">
    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="flex items-center justify-center mb-4">
        <img src="/logo.png" alt="GROPESTAMPADOS.UY" class="h-10 w-auto object-contain drop-shadow-lg">
      </div>
      <p class="text-gray-500 text-sm">Panel de Administración</p>
    </div>

    <!-- Card -->
    <div class="bg-[#111] border border-[#2a2a2a] rounded-2xl p-8 text-center">
      <div class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-5" style="background:rgba(4,155,122,0.12);border:1px solid rgba(4,155,122,0.3)">
        <svg class="w-7 h-7 text-mint" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:#049B7A"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      </div>
      <h1 class="text-xl font-bold mb-2">Acceso Administrador</h1>
      <p class="text-gray-500 text-sm mb-8">Iniciá sesión con tu cuenta autorizada para gestionar el catálogo</p>

      <button id="login-btn" class="btn-primary w-full justify-center !py-3.5">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
        Iniciar Sesión
      </button>

      <p id="login-error" class="text-red-400 text-xs mt-4 hidden">
        No tenés permisos de administrador.
      </p>
    </div>

    <p class="text-center text-gray-700 text-xs mt-6">
      <a href="/" class="hover:text-gray-400 transition-colors">← Volver al catálogo</a>
    </p>
  </div>

  <script>
    const netlifyIdentity = window.netlifyIdentity;

    netlifyIdentity.on("init", (user) => {
      if (user) {
        // Ya tiene sesión activa, ir directo al admin
        window.location.replace("/admin.html");
      }
    });

    netlifyIdentity.on("login", (user) => {
      netlifyIdentity.close();
      window.location.replace("/admin.html");
    });

    netlifyIdentity.init();

    document.getElementById("login-btn").addEventListener("click", () => {
      netlifyIdentity.open("login");
    });
  </script>
</body>
</html>
